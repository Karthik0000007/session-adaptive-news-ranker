name: CI

on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run unit tests
        run: python -m pytest tests/ -v --tb=short
      - name: Lint check
        run: python -m flake8 src/ --max-line-length=120 --ignore=E501,W503

  docker:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -t news-ranker .
      - name: Verify imports
        run: docker run --rm news-ranker python -c "from src import *; print('imports OK')"
