# Session-Adaptive News Ranker Configuration

# Data Configuration
data:
  dataset: mind  # mind dataset
  data_path: data/raw/
  processed_path: data/processed/
  session_gap_minutes: 30
  max_session_length: 50
  negative_samples: 4

# Retrieval Configuration
retrieval:
  embedding_dim: 128
  batch_size: 256
  learning_rate: 0.001
  epochs: 50
  max_features: 5000  # TF-IDF max features

# Ranking Configuration
ranking:
  model_type: lightgbm
  calibration: true
  num_leaves: 31
  learning_rate: 0.05
  n_estimators: 100

# Decision Layer Configuration
decision:
  default_weights: [0.4, 0.3, 0.2, 0.1]  # [E, R, D, N]
  smoothing_factor: 0.7
  diversity_threshold: 0.3

# Bandit Configuration
bandit:
  algorithm: linucb
  alpha: 0.5  # Exploration parameter
  n_actions: 4
  n_features: 11
  num_iterations: 10000

# Serving Configuration
serving:
  host: 0.0.0.0
  port: 8000
  redis_host: localhost
  redis_port: 6379
  cache_ttl: 300  # seconds
  latency_target_ms: 150

# Evaluation Configuration
evaluation:
  test_frac: 0.1
  val_frac: 0.1
  offline_metrics: [auc, logloss, ndcg@10, ndcg@20, recall@10, mrr]
  business_metrics: [ctr, avg_dwell, session_length, diversity_score, novelty_score]
  bandit_metrics: [avg_reward, ips_estimate, snips_estimate, action_entropy]
  num_seeds: 3
  seeds: [42, 123, 456]

# Logging Configuration
logging:
  level: INFO
  tensorboard_dir: runs/
  results_dir: results/
  checkpoint_dir: checkpoints/
