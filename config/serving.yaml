# Serving configuration
serving:
  host: "0.0.0.0"
  port: 8000
  
  # Latency budget (milliseconds)
  latency_budget:
    retrieval: 50
    ranking: 50
    decision_layer: 30
    total_p99: 150
  
  # Redis
  redis:
    host: "localhost"
    port: 6379
    db: 0
    session_ttl: 3600        # 1 hour
    cache_ttl: 300            # 5 minutes
  
  # Fallback chain
  fallback:
    tier1: "bandit"           # Full pipeline
    tier2: "rule_based"       # Rule-based weights + cached scores
    tier3: "cold_start"       # Pre-computed popular articles
  
  # Mobile-first defaults
  mobile:
    default_k: 10
    diversity_boost: 1.2
  web:
    default_k: 20
    diversity_boost: 1.0
